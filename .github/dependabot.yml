version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:00'
      timezone: 'Europe/Minsk'
    open-pull-requests-limit: 3
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '08:30'
      timezone: 'Europe/Minsk'
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
